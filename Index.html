<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="styletodo.css">
    <title>FlowState | Focus Suite</title>
</head>
<body class="light">

    <!-- دکمه > برای باز کردن منو (چسبیده به لبه چپ) -->
    <button class="hamburger-btn" id="hamburgerBtn">
        <svg class="icon-hamburger" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
        <svg class="icon-close" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>

    <!-- لایه تاریک پشت منو -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container">
        <!-- منوی سمت چپ -->
        <div class="sidebar" id="sidebar">
            <button class="nav-item" data-view="home">Home</button>
            <button class="nav-item" data-view="timer">Timer</button>
            <button class="nav-item" data-view="analytics">Analytics</button>
            <button class="nav-item" data-view="calendar">Calendar</button>
            <button class="nav-item" data-view="mindmap">Mind Map</button>
            <button class="nav-item" data-view="graveyard">Graveyard</button>
            <button class="nav-item" data-view="todo">Todo</button>
            <button class="nav-item" data-view="profile">Profile</button>
            <div class="theme-toggle"><button class="nav-item" id="darkLightToggle">Dark / Light</button></div>
        </div>

        <!-- محتوای اصلی -->
        <div class="main">
            <!-- صفحه Home -->
            <div id="homeView" class="view">
                <div class="day-nav">
                    <button id="prevDayBtn">Previous</button>
                    <span id="currentDateDisplay"></span>
                    <button id="nextDayBtn">Next</button>
                </div>
                <div class="period-grid" id="periodGrid"></div>
            </div>

            <!-- صفحه Timer -->
            <div id="timerView" class="view">
                <div class="timer-panel" id="timerPanel">
                    <div class="timer-display" id="timerDisplay">00:00:00</div>
                    <div class="timer-controls">
                        <button id="playBtn" class="control-btn">
                            <svg viewBox="0 0 24 24" width="46" height="46"><path d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"/></svg>
                        </button>
                        <button id="pauseBtn" class="control-btn" style="display:none;">
                            <svg viewBox="0 0 24 24" width="46" height="46"><path d="M6.75 5.25A.75.75 0 0 1 7.5 4.5H9a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H7.5a.75.75 0 0 1-.75-.75V5.25Zm7.5 0A.75.75 0 0 1 15 4.5h1.5a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H15a.75.75 0 0 1-.75-.75V5.25Z"/></svg>
                        </button>
                        <button id="stopBtn" class="control-btn" style="display:none;">
                            <svg viewBox="0 0 24 24" width="46" height="46"><path d="M4.5 7.5a3 3 0 0 1 3-3h9a3 3 0 0 1 3 3v9a3 3 0 0 1-3 3h-9a3 3 0 0 1-3-3v-9Z"/></svg>
                        </button>
                    </div>
                    <select id="taskSelectTimer" class="task-selector"><option value="">-- select a task --</option></select>
                    <button id="openSessionsBtn" class="session-btn-timer">Sessions</button>
                </div>
            </div>

            <!-- صفحه Analytics -->
            <div id="analyticsView" class="view">
                <div class="chart-container"><canvas id="hoursChart" width="400" height="200"></canvas></div>
                <div class="pie-chart-container"><h4>Time by Task</h4><canvas id="pieChart" width="400" height="200"></canvas></div>
                <div class="daily-breakdown" id="dailyBreakdown"></div>
            </div>

            <!-- صفحه Calendar -->
            <div id="calendarView" class="view">
                <div class="calendar-wrapper">
                    <div class="calendar-header">
                        <h2 id="calendarMonthYear"></h2>
                        <div><button id="prevMonthBtn" class="nav-cal-btn">Prev</button><button id="nextMonthBtn" class="nav-cal-btn">Next</button></div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                    <div id="calendarDayStats" class="day-stats-box">Click on a day</div>
                </div>
            </div>

            <!-- صفحه Mind Map -->
            <div id="mindmapView" class="view">
                <div class="mindmap-card">
                    <div id="mindmapDeleteAllBtn" class="mindmap-delete-all">Delete Map</div>
                    <button id="addMindmapTaskBtn" class="mindmap-add-btn">+ Add Task</button>
                    <div id="mindmapVerticalContainer" class="mindmap-vertical"></div>
                </div>
            </div>

            <!-- صفحه Graveyard -->
            <div id="graveyardView" class="view">
                <div class="graveyard-card">
                    <h3>Graveyard</h3>
                    <div id="graveyardList"></div>
                    <div style="margin-top:20px;">Do your tasks! otherwise they go to graveyard</div>
                </div>
            </div>

            <!-- صفحه Todo -->
            <div id="todoView" class="view">
                <div id="todoContainer" class="todo-container"></div>
            </div>

            <!-- صفحه Profile -->
            <div id="profileView" class="view">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z"/></svg>
                    </div>
                    <div class="profile-name" id="profileName">My friend</div>
                    <div class="profile-xp">
                        <div class="star-icon"><svg viewBox="0 0 24 24" fill="gold" stroke="gold"><path d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"/></svg></div>
                        <span id="profileXP">0</span>
                        <span id="profileLevel" style="margin-left:12px;">Lvl: 1</span>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item"><div class="stat-value" id="completedCount">0</div><div class="stat-label">Completed</div></div>
                        <div class="stat-item"><div class="stat-value" id="failedCount">0</div><div class="stat-label">Failed</div></div>
                        <div class="stat-item"><div class="stat-value" id="totalHours">0h 0m</div><div class="stat-label">Total Hours</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- سایدبار راست برای سشن‌ها -->
    <div id="sessionSidebar" class="session-sidebar">
        <div class="session-header">
            <span>SESSIONS</span>
            <span class="close-session" id="closeSessionBtn">&times;</span>
        </div>
        <div class="session-divider"></div>
        <div id="sessionListContainer"></div>
    </div>

    <!-- مودال اضافه کردن تسک -->
    <div id="taskModal" class="modal-overlay">
        <div class="modal-container">
            <h3>Add Task</h3>
            <input type="text" id="modalTaskName" placeholder="Task name">
            <div class="time-input-group">
                <input type="text" id="modalStartHour" class="time-input" placeholder="00" maxlength="2"><span>:</span>
                <input type="text" id="modalStartMin" class="time-input" placeholder="00" maxlength="2"><span> - </span>
                <input type="text" id="modalEndHour" class="time-input" placeholder="00" maxlength="2"><span>:</span>
                <input type="text" id="modalEndMin" class="time-input" placeholder="00" maxlength="2">
            </div>
            <div class="modal-buttons">
                <button id="modalOkBtn">OK</button>
                <button id="modalCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- آلرت -->
    <div id="customAlert" class="custom-alert">10 min — rest your eyes</div>

    <!-- منوی راست کلیک -->
    <div id="contextMenu" class="context-menu">
        <div id="ctxEdit">Edit</div>
        <div id="ctxDelete">Delete</div>
        <div class="context-divider"></div>
        <div id="ctxDone">Done!</div>
        <div id="ctxFailed">Failed</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="sctodo.js"></script>
</body>
</html>
